<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME-VISION | United By Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-content">
                <div class="logo-area">
                    <img src="logo-eurovision.png" alt="Logo Eurovisión" class="ev-logo">
                </div>
                <div class="slogan-area">
                    <p class="slogan-text">UNITED<br>BY MUSIC</p>
                </div>
            </div>
        </header>

        <main class="content-wrapper">
            <div class="video-section">
                <div class="video-frame">
                    <div id="youtube-player"></div>
                </div>
            </div>

            <section class="playlist-section">
                <div class="playlist-header">
                    <h3 class="section-title">CHOOSE A WINNER</h3>
                    <button class="btn-secondary" onclick="startMarathon()">▶ REPRODUCCIÓN CONTINUA</button>
                </div>
                
                <div id="playlist" class="playlist-grid"></div>
            </section>

            <div class="action-bar">
                <button class="btn-primary">START VOTING</button>
            </div>
        </main>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
